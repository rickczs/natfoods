server {
    listen 80;
    listen [::]:80;

    server_name natfoodsdaamazonia.com.br www.natfoodsdaamazonia.com.br;

    client_max_body_size 10M;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # O Certbot adicionara automaticamente os blocos de SSL ao executar:
    # certbot --nginx -d natfoodsdaamazonia.com.br -d www.natfoodsdaamazonia.com.br
}
